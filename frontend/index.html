<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amatayakul Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Initial Loading Splash -->
    <div class="loading-splash" id="loadingSplash">
        <div class="splash-content">
            <h1 class="splash-logo">Amatayakul</h1>
            <div class="splash-loader">
                <div class="loader-line"></div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Haunted Background -->
        <div class="bg-wrapper">
            <img src="bg.gif" alt="" class="bg-image">
            <div class="bg-dim"></div>
            <div class="noise"></div>
        </div>

        <!-- Clean Window Bar -->
        <header class="app-header" style="--wails-draggable:drag">
            <div class="header-drag" style="--wails-draggable:drag">
                <span class="window-title">Amatayakul Launcher</span>
            </div>
            <div class="header-controls" style="--wails-draggable:no-drag">
                <button class="ctrl-btn" id="btnMinimize">
                    <svg width="12" height="12" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn" id="btnMaximize">
                    <svg width="12" height="12" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn ctrl-close" id="btnClose">
                    <svg width="12" height="12" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
                </button>
            </div>
        </header>

        <!-- Sidebar Layout -->
        <div class="launcher-shell" style="--wails-draggable:no-drag">
            <aside class="sidebar">
                <div class="sidebar-top">
                    <h1 class="app-logo">Amatayakul</h1>
                    
                    <div class="status-panel">
                        <div class="status-box">
                            <div class="status-dot" id="statusDot"></div>
                            <span class="status-text" id="versionText">Minecraft 0.15.10 - Ready</span>
                        </div>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <button class="nav-btn active">
                        <span>DASHBOARD</span>
                    </button>
                    <button class="nav-btn" id="btnSettings">
                        <span>SETTINGS</span>
                    </button>
                </nav>

                <div class="sidebar-bottom">
                    <button class="github-link-btn" onclick="window.runtime.BrowserOpenURL('https://github.com/Aztral-Network')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                        <span>GitHub</span>
                    </button>
                </div>
            </aside>

            <main class="main-view">
                <div class="view-content">
                    <div class="hero-section">
                        <button class="btn-enter" id="btnLaunch" disabled>
                            <span class="enter-text">ENTER</span>
                            <div class="enter-subtext">ASCEND TO AMATAYAKUL</div>
                        </button>
                    </div>

                    <div class="orchestration-area" id="progressContainer" style="display: none;">
                        <div class="orchestration-bar">
                            <div class="orchestration-fill" id="progressFill"></div>
                        </div>
                        <span class="orchestration-label" id="progressText">Starting...</span>
                    </div>

                    <div class="status-message" id="statusMessage"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Improved Modal -->
    <div class="modal-root" id="settingsModal" style="--wails-draggable:no-drag">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="modal-top">
                <h3>Settings</h3>
                <button class="modal-close" id="closeSettings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-form">
                <div class="field">
                    <label>Injected Payload</label>
                    <div class="field-row">
                        <input type="text" id="customDllPath" placeholder="Default Amatayakul DLL" readonly>
                        <button class="field-btn" id="btnBrowse">Browse</button>
                    </div>
                    <p class="field-info">Select a custom DLL to inject into Minecraft.</p>
                </div>
                <div class="field-actions">
                    <button class="btn-primary" id="btnSaveSettings">Save Changes</button>
                    <button class="btn-outline" id="btnResetSettings">Reset to Default</button>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
